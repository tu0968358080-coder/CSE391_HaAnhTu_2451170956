<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>

    <header>
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="5" width="90" height="90" fill="none" stroke="black" />

        </svg>
        <h1>Sản Phẩm</h1>
    </header>

    <hr>

    <section>
        <figure>
            <img src="Anh1" 
                 alt="Mo_ta_anh_1" 
                 loading="lazy" 
                 width="600">
            <figcaption>Mo ta cho anh 1</figcaption>
        </figure>

        <figure>
            <img src="Anh2" 
                 alt="Mo_ta_anh_2" 
                 loading="lazy" 
                 width="600">
            <figcaption>Mo ta cho anh 2</figcaption>
        </figure>

        <figure>
            <img src="Anh3" 
                 alt="Mo_ta_anh_3" 
                 loading="lazy" 
                 width="600">
            <figcaption>Mo ta cho anh 3</figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <iframe width="560" height="315" 
                src="Youtube" 
                >
        </iframe>
    </section>

    <hr>
    <section>
        <video width="600" controls poster="Anh_poster">
            <source src="Youtube.mp4" type="video/mp4">
            <source src="TLU.webm" type="video/webm">
        </video>
    </section>

    <hr>

    <section>
        <audio controls>
            <source src="Audio.mp3" type="audio/ogg">
            <source src="Media.mp3" type="audio/mpeg">
        </audio>
    </section>

</body>
</html>
