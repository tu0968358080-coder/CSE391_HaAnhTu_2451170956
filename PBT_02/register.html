<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>
<body>

    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <p>
                <label for="fullname">Họ tên:</label><br>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ tên đầy đủ">
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </p>

            <p>
                <label for="phone">Số điện thoại:</label><br>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10 chữ số (vd: 0912345678)">
            </p>

            <p>
                <label for="dob">Ngày sinh:</label><br>
                <input type="date" id="dob" name="dob" >
            </p>

            <p>
                <label>Giới tính:</label><br>
                <input type="radio" id="male" name="gender" value="nam">
                <label for="male">Nam</label>
                
                <input type="radio" id="female" name="gender" value="nu">
                <label for="female">Nữ</label>
                
                <input type="radio" id="other" name="gender" value="khac">
                <label for="other">Khác</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <p>
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" pattern="^[A-Za-z0-9_]{3,20}$" placeholder="Chữ, số, underscore (3-20 ký tự)">
            </p>

            <p>
                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" minlength="8" pattern="^(?=.*[A-Z])(?=.*\d).+$" placeholder="Ít nhất 1 chữ hoa + 1 số">
            </p>

            <p>
                <label for="confirm_password">Xác nhận password:</label><br>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="^(?=.*[A-Z])(?=.*\d).+$" placeholder="Nhập lại mật khẩu giống trên">
            </p>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <p>
                <label for="city">Thành phố:</label><br>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hn">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="dn">Đà Nẵng</option>
                    <option value="ct">Cần Thơ</option>
                    <option value="hp">Hải Phòng</option>
                </select>
            </p>

            <p>
                <label for="district">Quận/Huyện:</label><br>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận 2</option>
                    <option value="q3">Quận 3</option>
                </select>
            </p>

            <p>
                <label for="address">Địa chỉ chi tiết:</label><br>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea>
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản sử dụng</label>
        </p>

        <p>
            <button type="submit">Đăng ký</button>
            <button type="reset">Nhập lại</button>
        </p>

    </form>

    <script>
        // JS để chặn chọn ngày tương lai cho "Ngày sinh"
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dob').setAttribute('max', today);
    </script>

</body>
</html>
